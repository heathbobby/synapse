name: synapse-product-development
description: Product-focused workflow for defining Synapse MVPs, capabilities, user experiences, runtime contracts, and implementation-ready
  product artifacts.
phases:
- id: phase-1
  name: MVP1 AI Coworker Workspace
  description: 'Define the first Synapse product slice: an operator workspace for one approved expert workflow.'
  iterations:
  - id: mvp1-ai-coworker-workspace
    name: MVP1 AI Coworker Workspace Definition
    description: Reframe the first product MVP around the Synapse operator experience, not the orchestration tooling internals.
    goal: 'Define Synapse MVP1 as a product experience where a human operator can

      define a destination, select one reusable expert workflow, attach

      approved knowledge, dispatch AI coworkers, monitor progress, review

      outputs, and capture learning. Treat the existing orchestration

      framework as prototype scaffolding and process evidence only.

      '
    agents:
    - role: product_owner
      inputs:
      - docs/refinement/iteration-inputs/product-mvp1-ai-coworker-workspace.md
      deliverables:
      - path: docs/product/MVP1/AI_COWORKER_WORKSPACE.md
        description: Product specification for the MVP1 operator workspace, personas, jobs, scope, non-goals, and requirements.
      - path: docs/product/MVP1/OPERATOR_JOURNEY.md
        description: End-to-end operator journey from destination definition through learning capture.
      token_budget: 30000
    - role: ux_designer
      inputs:
      - docs/refinement/iteration-inputs/product-mvp1-ai-coworker-workspace.md
      deliverables:
      - path: docs/product/MVP1/WORKSPACE_UX_SPEC.md
        description: UX structure, screens/states, information architecture, user actions, empty/error states, and review
          surfaces.
      token_budget: 28000
    - role: technical_architect
      inputs:
      - docs/refinement/iteration-inputs/product-mvp1-ai-coworker-workspace.md
      deliverables:
      - path: docs/product/MVP1/RUNTIME_CONTRACTS.md
        description: Product runtime contracts for workspace state, workflow run state, task state, knowledge context, approvals,
          audit, and learning events.
      token_budget: 32000
    - role: qa_lead
      inputs:
      - docs/refinement/iteration-inputs/product-mvp1-ai-coworker-workspace.md
      deliverables:
      - path: docs/product/MVP1/ACCEPTANCE_CRITERIA.md
        description: Product acceptance criteria and readiness gates for the MVP1 AI coworker workspace.
      token_budget: 24000
    completion_criteria:
      requirements:
      - Artifacts define Synapse MVP1 as a product workspace, not as cursor_orchestrator internals.
      - Operator journey covers destination definition, workflow selection, knowledge attachment, dispatch, monitoring, review,
        and learning capture.
      - Runtime contracts identify product state and audit concepts without committing to storage, provider, tenancy, or deployment
        technology.
      - Acceptance criteria are testable and trace to Synapse product requirements and capability map.
- id: phase-2
  name: MVP2 Knowledge and SME Persona Layer
  description: Define Synapse product capabilities for governed knowledge assets and reusable SME/persona templates.
  iterations:
  - id: mvp2-knowledge-persona-layer
    name: MVP2 Knowledge and Persona Product Definition
    description: Translate source-grounding contracts into Synapse product behavior for knowledge assets and SME/persona templates.
    goal: Define Synapse MVP2 as the product layer that turns approved sources, SME guidance, and workflow learnings into
      governed knowledge assets and reusable persona templates that AI coworkers can safely consume.
    agents:
    - role: product_owner
      inputs:
      - docs/refinement/iteration-inputs/product-mvp2-knowledge-persona-layer.md
      deliverables:
      - path: docs/product/MVP2/KNOWLEDGE_AND_PERSONA_LAYER.md
        description: Product specification for governed knowledge assets, SME/persona templates, source approval, and learning
          promotion.
      - path: docs/product/MVP2/KNOWLEDGE_WORKFLOW.md
        description: End-to-end product workflow for source intake, review, approval, grounding, persona use, and learning
          promotion.
      token_budget: 30000
    - role: technical_architect
      inputs:
      - docs/refinement/iteration-inputs/product-mvp2-knowledge-persona-layer.md
      deliverables:
      - path: docs/product/MVP2/KNOWLEDGE_PERSONA_CONTRACTS.md
        description: Logical product contracts for knowledge assets, source references, grounded claims, persona templates,
          approvals, and learning signals.
      token_budget: 32000
    - role: standards_curator
      inputs:
      - docs/refinement/iteration-inputs/product-mvp2-knowledge-persona-layer.md
      deliverables:
      - path: docs/product/MVP2/PERSONA_TEMPLATE_SYSTEM.md
        description: Product-facing SME/persona template model, composition rules, governance, and safe consumption standards.
      token_budget: 28000
    - role: qa_lead
      inputs:
      - docs/refinement/iteration-inputs/product-mvp2-knowledge-persona-layer.md
      deliverables:
      - path: docs/product/MVP2/ACCEPTANCE_CRITERIA.md
        description: Product acceptance criteria and readiness gates for MVP2 knowledge and persona layer.
      token_budget: 24000
    completion_criteria:
      requirements:
      - Artifacts define Synapse MVP2 as product capabilities, not repository-only source-grounding docs.
      - Knowledge workflow covers source intake, review, approval, grounding context creation, persona consumption, and learning
        promotion.
      - Persona template system defines reusable SME/persona behavior with governance, evidence, confidence, and escalation
        controls.
      - Runtime contracts avoid committing to storage, retrieval, embeddings, provider, tenancy, deployment, or compliance
        implementation.
      - Acceptance criteria trace to Synapse product requirements and capability map.
